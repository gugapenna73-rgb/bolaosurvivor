<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Survivor Bolão ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --verde: #2d9e4f;
    --verde-claro: #e8f5ed;
    --vermelho: #e03131;
    --vermelho-claro: #fff0f0;
    --azul: #1971c2;
    --azul-claro: #e8f0fc;
    --amarelo: #e67700;
    --amarelo-claro: #fff4e0;
    --cinza: #f1f3f5;
    --borda: #dee2e6;
    --texto: #212529;
    --texto-sec: #868e96;
    --branco: #ffffff;
    --sombra: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: var(--texto); min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; letter-spacing: 2px; }
  .header-logo span { color: #f9c74f; }
  .header-user { width: 36px; height: 36px; border-radius: 50%; background: #f9c74f; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #1a1a2e; cursor: pointer; }

  /* ── Tab bar ── */
  .tabbar {
    background: var(--branco); border-bottom: 1px solid var(--borda);
    display: flex; position: sticky; top: 60px; z-index: 99;
  }
  .tab { flex: 1; padding: 12px 4px 10px; text-align: center; font-size: 11px; font-weight: 500; color: var(--texto-sec); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.ativo { color: var(--azul); border-bottom-color: var(--azul); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── Páginas ── */
  .pagina { display: none; padding: 16px; padding-bottom: 80px; }
  .pagina.ativa { display: block; }

  /* ── Cards ── */
  .card { background: var(--branco); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: var(--sombra); }
  .card-titulo { font-size: 15px; font-weight: 600; color: var(--texto); margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--texto-sec); line-height: 1.5; }

  /* ── Badges ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-verde { background: var(--verde-claro); color: var(--verde); }
  .badge-vermelho { background: var(--vermelho-claro); color: var(--vermelho); }
  .badge-azul { background: var(--azul-claro); color: var(--azul); }
  .badge-amarelo { background: var(--amarelo-claro); color: var(--amarelo); }

  /* ── Progress rodadas ── */
  .progress-row { display: flex; gap: 8px; margin-top: 12px; }
  .pdot { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .pdot-ok { background: var(--verde); color: #fff; }
  .pdot-err { background: var(--vermelho); color: #fff; }
  .pdot-ativo { background: var(--azul); color: #fff; border: 3px solid #a5c8f5; }
  .pdot-fut { background: var(--cinza); color: var(--texto-sec); }

  /* ── Jogo card ── */
  .jogo-card { background: var(--branco); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: var(--sombra); border: 2px solid transparent; transition: border-color 0.15s; }
  .jogo-card.tem-seleção { border-color: var(--azul); }
  .jogo-data { font-size: 11px; color: var(--texto-sec); margin-bottom: 10px; }
  .times-row { display: flex; align-items: center; gap: 8px; }
  .time-btn {
    flex: 1; padding: 10px 8px; border-radius: 10px; border: 1.5px solid var(--borda);
    background: var(--cinza); font-size: 13px; font-weight: 600; color: var(--texto);
    cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3;
  }
  .time-btn:active { transform: scale(0.97); }
  .time-btn.selecionado { background: var(--azul-claro); border-color: var(--azul); color: var(--azul); }
  .time-btn.bloqueado { opacity: 0.4; cursor: not-allowed; background: #f1f3f5; }
  .time-btn small { display: block; font-size: 10px; font-weight: 400; color: var(--amarelo); margin-top: 2px; }
  .vs { font-size: 12px; color: var(--texto-sec); font-weight: 500; flex-shrink: 0; }

  /* ── Botão principal ── */
  .btn-principal {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--azul); color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background 0.15s;
  }
  .btn-principal:active { background: #1560a8; }
  .btn-principal:disabled { background: var(--borda); color: var(--texto-sec); cursor: not-allowed; }
  .btn-verde { background: var(--verde); }
  .btn-verde:active { background: #238b3e; }
  .btn-vermelho { background: var(--vermelho); }

  /* ── Stats grid ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--branco); border-radius: 12px; padding: 14px; box-shadow: var(--sombra); text-align: center; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--texto); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--texto-sec); margin-top: 4px; }

  /* ── Ranking ── */
  .rank-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--branco); border-bottom: 1px solid var(--cinza); }
  .rank-item.eu { background: var(--azul-claro); }
  .rank-item.eliminado { opacity: 0.5; }
  .rank-pos { width: 22px; font-size: 13px; font-weight: 600; color: var(--texto-sec); }
  .rank-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .rank-info { flex: 1; }
  .rank-nome { font-size: 14px; font-weight: 500; color: var(--texto); }
  .rank-sub { font-size: 12px; color: var(--texto-sec); }

  /* ── Login ── */
  .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 100%); }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: #fff; letter-spacing: 4px; text-align: center; }
  .login-logo span { color: #f9c74f; }
  .login-sub { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-bottom: 32px; }
  .login-card { background: var(--branco); border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; }
  .toggle-row { display: flex; background: var(--cinza); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
  .toggle-btn { flex: 1; padding: 9px; border-radius: 8px; border: none; background: transparent; font-size: 14px; font-weight: 500; color: var(--texto-sec); cursor: pointer; transition: all 0.15s; }
  .toggle-btn.ativo { background: var(--branco); color: var(--texto); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--borda); border-radius: 10px; font-size: 14px; margin-bottom: 10px; outline: none; font-family: 'Inter', sans-serif; transition: border-color 0.15s; }
  .input:focus { border-color: var(--azul); }

  /* ── Centro ── */
  .centro { text-align: center; padding: 48px 24px; }
  .centro-emoji { font-size: 52px; margin-bottom: 12px; }
  .centro-titulo { font-size: 18px; font-weight: 600; color: var(--texto); margin-bottom: 8px; }
  .centro-sub { font-size: 14px; color: var(--texto-sec); line-height: 1.6; }

  /* ── PIX box ── */
  .pix-box { background: var(--azul-claro); border-radius: 12px; padding: 16px; text-align: center; margin: 16px 0; }
  .pix-label { font-size: 11px; color: var(--azul); font-weight: 600; margin-bottom: 4px; }
  .pix-chave { font-size: 16px; font-weight: 700; color: #0c447c; word-break: break-all; }

  /* ── Admin ── */
  .admin-tabs { display: flex; background: var(--cinza); border-radius: 10px; padding: 4px; margin-bottom: 16px; gap: 4px; overflow-x: auto; }
  .admin-tab { flex: 1; min-width: 80px; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; font-size: 12px; font-weight: 500; color: var(--texto-sec); cursor: pointer; white-space: nowrap; }
  .admin-tab.ativo { background: var(--branco); color: var(--azul); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .secao-titulo { font-size: 11px; font-weight: 600; color: var(--texto-sec); text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }
  .placar-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .placar-input { width: 55px; text-align: center; }
  .placar-x { font-size: 16px; color: var(--texto-sec); }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #212529; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--texto-sec); font-size: 14px; }

  /* ── Prazo encerrado ── */
  .prazo-box { background: var(--vermelho-claro); border-radius: 12px; padding: 14px; margin-bottom: 12px; border-left: 4px solid var(--vermelho); }
  .prazo-titulo { font-size: 14px; font-weight: 600; color: var(--vermelho); }
  .prazo-sub { font-size: 12px; color: #c92a2a; margin-top: 4px; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="tela-login">
  <div class="login-wrap">
    <div class="login-logo">SURVIVOR<br><span>BOLÃO</span></div>
    <div class="login-sub">Brasileirão 2026 · Série A</div>
    <div class="login-card">
      <div class="toggle-row">
        <button class="toggle-btn ativo" onclick="setModo('entrar')">Entrar</button>
        <button class="toggle-btn" onclick="setModo('cadastro')">Cadastrar</button>
      </div>
      <div id="campo-nome" style="display:none">
        <input class="input" id="input-nome" type="text" placeholder="Seu nome completo" autocomplete="name">
      </div>
      <input class="input" id="input-email" type="email" placeholder="E-mail" autocomplete="email">
      <input class="input" id="input-senha" type="password" placeholder="Senha" autocomplete="current-password">
      <button class="btn-principal" id="btn-login" onclick="handleAuth()">Entrar</button>
      <div id="login-erro" style="color:var(--vermelho);font-size:12px;text-align:center;margin-top:10px;"></div>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="tela-app" style="display:none">
  <div class="header">
    <div class="header-logo">SURVIVOR <span>BOLÃO</span></div>
    <div class="header-user" id="avatar-user" onclick="handleLogout()"></div>
  </div>

  <div class="tabbar">
    <div class="tab ativo" onclick="mudarAba('palpites')">
      <span class="tab-icon">⚽</span>Palpites
    </div>
    <div class="tab" onclick="mudarAba('ranking')">
      <span class="tab-icon">🏆</span>Ranking
    </div>
    <div class="tab" onclick="mudarAba('historico')">
      <span class="tab-icon">📋</span>Histórico
    </div>
    <div class="tab" onclick="mudarAba('regulamento')">
      <span class="tab-icon">📜</span>Regras
    </div>
    <div class="tab" id="tab-admin" style="display:none" onclick="mudarAba('admin')">
      <span class="tab-icon">⚙️</span>Admin
    </div>
  </div>

  <!-- PALPITES -->
  <div class="pagina ativa" id="pag-palpites">
    <div class="loading">Carregando...</div>
  </div>

  <!-- RANKING -->
  <div class="pagina" id="pag-ranking">
    <div class="loading">Carregando...</div>
  </div>

  <!-- HISTÓRICO -->
  <div class="pagina" id="pag-historico">
    <div class="loading">Carregando...</div>
  </div>

  <!-- ADMIN -->
  <div class="pagina" id="pag-regulamento"></div>

  <div class="pagina" id="pag-admin">
    <div class="loading">Carregando...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const { createClient } = supabase
const sb = createClient(
  'https://mofejzhphvtscqkqnkdt.supabase.co',
  'sb_publishable_lJX27uDBAEyK1liHZFivDw_4hSBrvRZ'
)

const ADMIN_IDS = ['44a3eea8-852d-4025-9a98-0949b99276ed']

let sessao = null, usuario = null, bolao = null, participante = null
let palpites = [], timesUsados = [], jogosRodada = [], rodadaAtual = null

// ── Auth ──────────────────────────────────────────────────────────────────────
let modoAuth = 'entrar'
function setModo(m) {
  modoAuth = m
  document.querySelectorAll('.toggle-btn').forEach((b,i) => b.classList.toggle('ativo', (i===0&&m==='entrar')||(i===1&&m==='cadastro')))
  document.getElementById('campo-nome').style.display = m === 'cadastro' ? 'block' : 'none'
  document.getElementById('btn-login').textContent = m === 'entrar' ? 'Entrar' : 'Criar conta'
  document.getElementById('login-erro').textContent = ''
}

async function handleAuth() {
  const email = document.getElementById('input-email').value.trim()
  const senha = document.getElementById('input-senha').value
  const nome = document.getElementById('input-nome').value.trim()
  const btn = document.getElementById('btn-login')
  btn.disabled = true; btn.textContent = 'Aguarde...'
  document.getElementById('login-erro').textContent = ''

  if (modoAuth === 'cadastro') {
    if (!nome) { showErro('Preencha seu nome'); btn.disabled=false; btn.textContent='Criar conta'; return }
    const { data, error } = await sb.auth.signUp({ email, password: senha })
    if (error) { showErro(error.message); btn.disabled=false; btn.textContent='Criar conta'; return }
    if (data.user) {
      await sb.from('usuarios').insert({ id: data.user.id, nome, email })
      await iniciarApp(data.user)
    }
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha })
    if (error) { showErro('E-mail ou senha incorretos'); btn.disabled=false; btn.textContent='Entrar'; return }
    await iniciarApp(data.user)
  }
}

function showErro(msg) {
  document.getElementById('login-erro').textContent = msg
  document.getElementById('btn-login').disabled = false
  document.getElementById('btn-login').textContent = modoAuth === 'entrar' ? 'Entrar' : 'Criar conta'
}

async function handleLogout() {
  if (!confirm('Sair da conta?')) return
  await sb.auth.signOut()
  location.reload()
}

// ── Iniciar app ───────────────────────────────────────────────────────────────
async function iniciarApp(user) {
  sessao = user
  document.getElementById('tela-login').style.display = 'none'
  document.getElementById('tela-app').style.display = 'block'

  // Buscar usuário
  const { data: u } = await sb.from('usuarios').select('*').eq('id', user.id).single()
  usuario = u
  if (usuario) {
    const iniciais = usuario.nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase()
    document.getElementById('avatar-user').textContent = iniciais
    // Tentar foto do Gravatar
    try {
      const url = await gravatarUrl(usuario.email)
      const img = new Image()
      img.onload = () => {
        const el = document.getElementById('avatar-user')
        if (el) {
          el.textContent = ''
          el.style.padding = '0'
          el.style.overflow = 'hidden'
          el.innerHTML = `<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`
        }
      }
      img.src = url
    } catch(e) {}
  }

  // Admin?
  if (ADMIN_IDS.includes(user.id)) {
    document.getElementById('tab-admin').style.display = 'block'
  }

  // Buscar bolão ativo
  const { data: b } = await sb.from('boloes').select('*').in('status',['aberto','em_andamento']).order('criado_em',{ascending:false}).limit(1).single()
  bolao = b

  if (bolao) {
    // Buscar participante
    const { data: p } = await sb.from('participantes').select('*').eq('bolao_id',bolao.id).eq('user_id',user.id).maybeSingle()
    participante = p

    // Buscar palpites
    const { data: pl } = await sb.from('palpites').select('*').eq('bolao_id',bolao.id).eq('user_id',user.id).order('rodada')
    palpites = pl || []
    timesUsados = palpites.map(p => p.time_escolhido)

    // Rodada atual
    rodadaAtual = bolao.rodada_inicio
    for (let r = bolao.rodada_inicio; r <= bolao.rodada_fim; r++) {
      if (!palpites.find(p => p.rodada === r)) { rodadaAtual = r; break }
      rodadaAtual = r
    }

    // Buscar jogos da rodada atual
    const { data: j } = await sb.from('jogos').select('*').eq('rodada', rodadaAtual).order('data_jogo')
    jogosRodada = j || []
  }

  renderPalpites()
  renderRanking()
  renderHistorico()
  if (ADMIN_IDS.includes(user.id)) renderAdmin()
}

// ── Render Palpites ───────────────────────────────────────────────────────────
let jogoSel = null, timeSel = null

function renderPalpites() {
  const el = document.getElementById('pag-palpites')

  if (!bolao) {
    el.innerHTML = `<div class="centro"><div class="centro-emoji">🏆</div><div class="centro-titulo">Nenhum bolão ativo</div><div class="centro-sub">Aguarde a abertura do próximo bolão!</div></div>`
    return
  }

  if (!participante) {
    el.innerHTML = `<div class="centro"><div class="centro-emoji">⚽</div><div class="centro-titulo">${bolao.nome}</div><div class="centro-sub">Você ainda não está inscrito.</div><button class="btn-principal" style="max-width:280px;margin:16px auto 0;display:block" onclick="inscrever()">Quero participar!</button></div>`
    return
  }

  if (!participante.pagamento_confirmado) {
    el.innerHTML = `<div class="centro"><div class="centro-emoji">💸</div><div class="centro-titulo">Confirme seu pagamento</div><div class="centro-sub">Envie R$ ${parseFloat(bolao.valor_inscricao).toFixed(2)} via PIX para garantir sua vaga.</div><div class="pix-box"><div class="pix-label">Chave PIX</div><div class="pix-chave">${bolao.chave_pix}</div></div><div class="centro-sub">Após o envio, aguarde a confirmação do administrador.</div></div>`
    return
  }

  if (participante.status === 'eliminado') {
    el.innerHTML = `<div class="centro"><div class="centro-emoji">😢</div><div class="centro-titulo">Você foi eliminado</div><div class="centro-sub">Eliminado na rodada ${participante.rodada_eliminado}.<br>Aguarde o próximo bolão!</div></div>`
    return
  }

  if (participante.status === 'vencedor') {
    el.innerHTML = `<div class="centro"><div class="centro-emoji">🏆</div><div class="centro-titulo">Você é VENCEDOR!</div><div class="centro-sub">Parabéns! Você acertou todas as ${bolao.rodada_fim - bolao.rodada_inicio + 1} rodadas.<br>O prêmio será transferido em breve!</div></div>`
    return
  }

  // Progress dots
  let dots = ''
  for (let r = bolao.rodada_inicio; r <= bolao.rodada_fim; r++) {
    const p = palpites.find(x => x.rodada === r)
    const cls = p?.status==='acertou' ? 'pdot-ok' : p?.status==='errou' ? 'pdot-err' : r===rodadaAtual ? 'pdot-ativo' : 'pdot-fut'
    dots += `<div class="pdot ${cls}">${r}</div>`
  }

  const palpiteFeito = palpites.find(p => p.rodada === rodadaAtual)

  // Verificar prazo (1h antes do primeiro jogo)
  let prazoEncerrado = false
  let msgPrazo = ''
  let primeiroJogo = null
  if (jogosRodada.length > 0) {
    primeiroJogo = new Date(jogosRodada.reduce((a,b) => new Date(a.data_jogo) < new Date(b.data_jogo) ? a : b).data_jogo)
    prazoEncerrado = new Date() >= new Date(primeiroJogo.getTime() - 60*60*1000)
    msgPrazo = `Primeiro jogo: ${primeiroJogo.toLocaleString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}`
  }

  let html = `
    <div class="card">
      <div class="card-titulo">${bolao.nome}</div>
      <div class="progress-row">${dots}</div>
    </div>`

  if (palpiteFeito) {
    const statusTxt = palpiteFeito.status==='acertou' ? '✓ Acertou!' : palpiteFeito.status==='errou' ? '✗ Errou' : '⏳ Aguardando resultado'
    const badgeCls = palpiteFeito.status==='acertou' ? 'badge-verde' : palpiteFeito.status==='errou' ? 'badge-vermelho' : 'badge-amarelo'
    html += `
      <div class="card">
        <div class="card-titulo">Rodada ${rodadaAtual} — palpite confirmado</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
          <div style="font-size:16px;font-weight:700">${palpiteFeito.time_escolhido}</div>
          <span class="badge ${badgeCls}">${statusTxt}</span>
        </div>
      </div>`

        const selFora = jogoSel?.id === jogo.id && timeSel === jogo.time_fora

          </div>`

      const txtWpp = encodeURIComponent('Fiz meu palpite no Survivor Bolão! 🔥\nRodada ' + rodadaAtual + ': apostei no *' + palpiteFeito.time_escolhido + '*\nParticipe também: https://bolaosurvivor.netlify.app')
      html += `<a href="https://wa.me/?text=${txtWpp}" target="_blank" style="display:block;margin-top:8px;padding:14px;border-radius:12px;background:#25D366;color:#fff;text-align:center;font-weight:600;font-size:14px;text-decoration:none">📲 Compartilhar palpite no WhatsApp</a>`
    }
  }

  if (timesUsados.length > 0) {

  el.innerHTML = html
  setTimeout(() => {

function selecionarTime(jogoId, time) {
  jogoSel = jogosRodada.find(j => j.id === jogoId)
  timeSel = time
  renderPalpites()
}

async function inscrever() {
  if (!bolao || !sessao) return
  const { error } = await sb.from('participantes').insert({ bolao_id: bolao.id, user_id: sessao.id })
  if (error) { toast('Erro ao se inscrever'); return }
  const { data: p } = await sb.from('participantes').select('*').eq('bolao_id',bolao.id).eq('user_id',sessao.id).single()
  participante = p
  renderPalpites()
}

async function confirmarPalpite() {
  if (!jogoSel || !timeSel || !bolao || !sessao) {
    toast('Erro: dados incompletos'); return
  }
  // Verificar se já tem palpite nessa rodada
  const jaFez = palpites.find(p => p.rodada === rodadaAtual)
  if (jaFez) { toast('Você já fez palpite nessa rodada!'); return }

  const payload = {
    bolao_id: bolao.id,
    user_id: sessao.id,
    rodada: rodadaAtual,
    time_escolhido: timeSel,
    jogo_id: jogoSel.id
  }

  const { data, error } = await sb.from('palpites').insert(payload).select().single()
  
  if (error) {
    toast('Erro: ' + error.message)
    console.error('Erro palpite:', error)
    return
  }
  
  toast('✅ Palpite confirmado!')
  palpites.push(data || { rodada: rodadaAtual, time_escolhido: timeSel, status: 'pendente', jogo_id: jogoSel.id })
  timesUsados.push(timeSel)
  jogoSel = null; timeSel = null
  renderPalpites()
  renderHistorico()
}

function iniciarContador(primeiroJogo) {
  const el = document.getElementById('countdown')
  if (!el || !primeiroJogo) return
  const prazo = new Date(primeiroJogo.getTime() - 60*60*1000)
  
  function atualizar() {
    const agora = new Date()
    const diff = prazo - agora
    if (diff <= 0) {
      el.textContent = '⛔ Prazo encerrado!'
      el.style.background = '#fcebeb'
      return
    }
    const h = Math.floor(diff / 3600000)
    const m = Math.floor((diff % 3600000) / 60000)
    const s = Math.floor((diff % 60000) / 1000)
    el.textContent = `⏳ Prazo para palpite: ${h}h ${m}m ${s}s`
    setTimeout(atualizar, 1000)
  }
  atualizar()
}

function attachPalpiteEvents() {
  document.querySelectorAll('#pag-palpites .time-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.getAttribute('data-idx'))
      const lado = this.getAttribute('data-lado')
      if (isNaN(idx) || !lado) return
      const jogo = jogosRodada[idx]
      if (!jogo) return
      const time = lado === 'casa' ? jogo.time_casa : jogo.time_fora
      selecionarTime(jogo.id, time)
    })
  })
  const confirmBtn = document.getElementById('btn-confirmar-palpite')
  if (confirmBtn) confirmBtn.addEventListener('click', confirmarPalpite)
}

      ${avatarHtml(r.nome, r.email||'')}
      <div class="rank-info">

  if (eliminados.length > 0) {
    html += `<div class="secao-titulo">Eliminados (${eliminados.length})</div><div style="border-radius:14px;overflow:hidden;box-shadow:var(--sombra)">`

        </div>
        <span class="badge badge-vermelho">Elim.</span>

      .select('time_escolhido')
      .eq('bolao_id', bolao.id)

    if (apostas && apostas.length > 0) {
      // Verificar se prazo encerrado
      const { data: jogosR } = await sb.from('jogos').select('data_jogo').eq('rodada', rodadaAtual).order('data_jogo').limit(1)
      const primeiroJogo = jogosR && jogosR.length > 0 ? new Date(jogosR[0].data_jogo) : null

  el.innerHTML = html

async function encerrarRodada(bolaoId, rodada) {
  if (!confirm(`Encerrar rodada ${rodada} e processar eliminações?`)) return
  const { data: pl } = await sb.from('palpites').select('*, jogo:jogos(*)').eq('bolao_id',bolaoId).eq('rodada',rodada).eq('status','pendente')
  for (const p of (pl||[])) {
    const j = p.jogo
    if (!j?.encerrado) continue
    const vencedor = j.gols_casa > j.gols_fora ? j.time_casa : j.gols_fora > j.gols_casa ? j.time_fora : null
    const acertou = vencedor === p.time_escolhido
    await sb.from('palpites').update({ status: acertou?'acertou':'errou' }).eq('id',p.id)
    if (!acertou) await sb.from('participantes').update({ status:'eliminado', rodada_eliminado:rodada }).eq('bolao_id',bolaoId).eq('user_id',p.user_id)
  }

  // Checar quantos ainda estão ativos
  const { data: ativos } = await sb.from('participantes').select('*').eq('bolao_id',bolaoId).eq('status','ativo')
  const { data: b } = await sb.from('boloes').select('*').eq('id',bolaoId).single()

  // Se ninguém sobrou ativo — todos foram eliminados nessa rodada — divide entre quem chegou até aqui
  if (ativos && ativos.length === 0) {
    // Pega quem foi eliminado nessa rodada (os últimos sobreviventes)
    const { data: ultimosSobreviventes } = await sb.from('participantes')
      .select('*').eq('bolao_id',bolaoId).eq('rodada_eliminado',rodada)
    for (const p of (ultimosSobreviventes||[])) {
      await sb.from('participantes').update({ status:'vencedor' }).eq('id',p.id)
    }
    const { count } = await sb.from('participantes').select('*',{count:'exact',head:true}).eq('bolao_id',bolaoId)
    const total = (count||0) * parseFloat(b.valor_inscricao)
    await sb.from('boloes').update({ premio_total:total, premio_liquido:total*0.85, status:'encerrado' }).eq('id',bolaoId)
    const novaInicio = b.rodada_fim + 1
    const num = parseInt(b.nome.match(/#(\d+)/)?.[1]||'1') + 1
    await sb.from('boloes').insert({ nome:`Bolão #${num} — Rodadas ${novaInicio} a ${novaInicio+4}`, rodada_inicio:novaInicio, rodada_fim:novaInicio+4, chave_pix:b.chave_pix, valor_inscricao:b.valor_inscricao, taxa_site:b.taxa_site, status:'aberto' })
    toast('⚠️ Todos eliminados! Últimos sobreviventes dividem o prêmio. Próximo bolão aberto.')
  } else if (b && rodada === b.rodada_fim) {
    // Rodada final — quem sobrou é vencedor
    await sb.from('participantes').update({ status:'vencedor' }).eq('bolao_id',bolaoId).eq('status','ativo')
    const { count } = await sb.from('participantes').select('*',{count:'exact',head:true}).eq('bolao_id',bolaoId)
    const total = (count||0) * parseFloat(b.valor_inscricao)
    await sb.from('boloes').update({ premio_total:total, premio_liquido:total*0.85, status:'encerrado' }).eq('id',bolaoId)
    const novaInicio = b.rodada_fim + 1
    const num = parseInt(b.nome.match(/#(\d+)/)?.[1]||'1') + 1
    await sb.from('boloes').insert({ nome:`Bolão #${num} — Rodadas ${novaInicio} a ${novaInicio+4}`, rodada_inicio:novaInicio, rodada_fim:novaInicio+4, chave_pix:b.chave_pix, valor_inscricao:b.valor_inscricao, taxa_site:b.taxa_site, status:'aberto' })
    toast('🏆 Bolão encerrado! Próximo bolão aberto.')
  } else {
    toast(`✅ Rodada ${rodada} encerrada!`)
  }
  renderAdmin()
}

async function confirmarPix(bolaoId, email) {
  const { data: u } = await sb.from('usuarios').select('id').eq('email',email).single()
  if (!u) { toast('Usuário não encontrado'); return }
  await sb.from('participantes').update({ pagamento_confirmado:true }).eq('bolao_id',bolaoId).eq('user_id',u.id)
  
  // Recalcular premio automaticamente
  const { count } = await sb.from('participantes').select('*',{count:'exact',head:true})
    .eq('bolao_id',bolaoId).eq('pagamento_confirmado',true)
  const { data: b } = await sb.from('boloes').select('valor_inscricao,taxa_site').eq('id',bolaoId).single()
  if (b) {
    const total = (count||0) * parseFloat(b.valor_inscricao)
    const liquido = total * (1 - parseFloat(b.taxa_site))
    await sb.from('boloes').update({ premio_total: total, premio_liquido: liquido }).eq('id', bolaoId)
  }
  
  toast('✅ Pagamento confirmado! Prêmio atualizado.')
  renderAdmin()
}

async function removerParticipante(email, bolaoId) {
  if (!confirm('Remover ' + email + ' do bolão? Todos os palpites serão apagados.')) return
  const { data: u } = await sb.from('usuarios').select('id').eq('email',email).single()
  if (!u) { toast('Usuário não encontrado'); return }
  await sb.from('palpites').delete().eq('user_id',u.id).eq('bolao_id',bolaoId)
  await sb.from('participantes').delete().eq('user_id',u.id).eq('bolao_id',bolaoId)
  toast('✅ Participante removido!')
  renderAdmin()
}

async function resetarPalpite(email, rodada) {
  if (!confirm(`Resetar palpite da rodada ${rodada} de ${email}?`)) return
  const { data: u } = await sb.from('usuarios').select('id').eq('email',email).single()
  if (!u) { toast('Usuário não encontrado'); return }
  await sb.from('palpites').delete().eq('user_id',u.id).eq('rodada',rodada)
  await sb.from('participantes').update({ status:'ativo', rodada_eliminado:null }).eq('user_id',u.id).eq('rodada_eliminado',rodada)
  toast('✅ Palpite resetado! Peça para o participante recarregar a página.')
  renderAdmin()
}

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'))

  document.getElementById('pag-'+aba).classList.add('ativa')

}

// ── Gravatar ──────────────────────────────────────────────────────────────────
async function gravatarUrl(email) {
  const msgBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(email.trim().toLowerCase()))
  const hashArray = Array.from(new Uint8Array(msgBuffer))
  const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('')
  return `https://www.gravatar.com/avatar/${hash}?d=404&s=80`
}

function avatarHtml(nome, email, size=36) {
  const ini = nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase()
  const cores = [['#e8f0fc','#1971c2'],['#fff4e0','#e67700'],['#e8f5ed','#2d9e4f'],['#f3f0ff','#5c37d6'],['#fce8f3','#a61e4d']]
  const idx = nome.charCodeAt(0) % cores.length
  const [bg,fg] = cores[idx]
  const id = 'av-' + Math.random().toString(36).substr(2,6)
  // Tenta carregar foto do Gravatar, se falhar mostra iniciais
  setTimeout(async () => {
    try {
      const url = await gravatarUrl(email)
      const img = new Image()
      img.onload = () => {
        const el = document.getElementById(id)
        if (el) el.innerHTML = `<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`
      }
      img.src = url
    } catch(e) {}
  }, 100)
  return `<div id="${id}" class="rank-avatar" style="background:${bg};color:${fg};width:${size}px;height:${size}px;font-size:${Math.floor(size*0.35)}px">${ini}</div>`
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}
